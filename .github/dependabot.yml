# Dependabot opens PRs against `dev` — see CONTRIBUTING.md.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies

  # Uncomment when using Go modules:
  # - package-ecosystem: gomod
  #   directory: /
  #   target-branch: dev
  #   schedule:
  #     interval: weekly
  #     day: monday
  #   open-pull-requests-limit: 5
  #   labels:
  #     - dependencies

  # Uncomment when using npm (adjust directory):
  # - package-ecosystem: npm
  #   directory: /
  #   target-branch: dev
  #   schedule:
  #     interval: weekly
  #     day: monday
