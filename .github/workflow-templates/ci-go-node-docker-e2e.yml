# Full CI pipeline template (Go + Node + Docker + Cypress + Trivy).
# Copy to .github/workflows/ci.yml and replace <your-project> with your binary name.
# See templates/pipelines/README.md for enable steps.
name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  test-linux:
    name: Linux — unit + API smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web && npm ci && npm run build

      - name: Embed static assets
        run: |
          rm -rf cmd/<your-project>/static/*
          cp -r web/dist/* cmd/<your-project>/static/

      - name: Unit tests
        run: go test -race -count=1 ./...

      - name: Govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Build binary
        run: go build -o bin/<your-project> ./cmd/<your-project>

      - name: API smoke
        run: bash scripts/smoke-api.sh ./bin/<your-project>

  test-windows:
    name: Windows — unit + API smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build
        shell: pwsh
        run: ./build.ps1

      - name: Govulncheck
        shell: pwsh
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: API smoke
        shell: pwsh
        run: ./scripts/smoke-api.ps1

  docker-smoke:
    name: Linux — Docker smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker CLI scan + API smoke
        run: bash scripts/smoke-docker.sh

  e2e-linux:
    name: Linux — Cypress E2E
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.11"
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Cypress E2E
        run: bash scripts/e2e-run.sh

      - name: Upload Cypress screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots-pr-${{ github.event.pull_request.number || github.run_number }}
          path: web/cypress/screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish E2E screenshots for PR comment
        id: publish-screenshots
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bash scripts/e2e-pr-screenshots-comment.sh

      - name: Comment PR with inline screenshots
        if: github.event_name == 'pull_request' && always() && steps.publish-screenshots.outcome == 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-tag: e2e-screenshots-gallery
          edit-mode: replace
          body-path: .e2e-screenshots-comment.md

      - name: Fallback PR comment (artifact link)
        if: github.event_name == 'pull_request' && always() && steps.publish-screenshots.outcome != 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-tag: e2e-screenshots-fallback
          edit-mode: replace
          body: |
            ## E2E UI snapshots

            Inline screenshot upload was unavailable for this run. Download PNGs from the [workflow run artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) (`cypress-screenshots-pr-${{ github.event.pull_request.number }}`).

  security:
    name: Security — Trivy
    runs-on: ubuntu-latest
    needs: [test-linux]
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        id: trivy-fs
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table
          output: trivy-fs.txt
          skip-dirs: web/node_modules
          trivyignores: .trivyignore

      - name: Build image for container scan
        run: docker build -t <your-project>:ci .

      - name: Trivy image scan
        id: trivy-image
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          scan-type: image
          image-ref: <your-project>:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          format: table
          output: trivy-image.txt

      - name: Prepare Trivy PR comment
        if: github.event_name == 'pull_request' && always()
        env:
          RUN_ID: ${{ github.run_id }}
          FS_OUTCOME: ${{ steps.trivy-fs.outcome }}
          IMAGE_OUTCOME: ${{ steps.trivy-image.outcome }}
        run: bash scripts/trivy-pr-comment.sh

      - name: Comment PR with Trivy report
        if: github.event_name == 'pull_request' && always()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-tag: trivy-security-report
          edit-mode: replace
          body-path: .trivy-pr-comment.md

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-reports-pr-${{ github.event.pull_request.number || github.run_number }}
          path: |
            trivy-fs.txt
            trivy-image.txt
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail if Trivy found issues
        if: steps.trivy-fs.outcome == 'failure' || steps.trivy-image.outcome == 'failure'
        run: exit 1
