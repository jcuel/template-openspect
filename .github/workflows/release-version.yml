name: Release version

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: Optional explicit semver (overrides vars.RELEASE_VERSION)
        required: false

permissions:
  contents: write

jobs:
  bump-and-tag:
    name: Bump version and tag release
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[release] bump version') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version and bump files
        id: bump
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || '' }}
          RELEASE_VERSION: ${{ inputs.version || vars.RELEASE_VERSION }}
          BUMP_KIND: ${{ vars.RELEASE_BUMP_KIND }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          msg="$COMMIT_MESSAGE"
          if [[ -n "$msg" ]] && [[ "$msg" =~ Merge[[:space:]]pull[[:space:]]request[[:space:]]#([0-9]+) ]]; then
            pr_num="${BASH_REMATCH[1]}"
            pr_body="$(gh pr view "$pr_num" --repo "$GITHUB_REPOSITORY" --json body --jq .body 2>/dev/null || true)"
            msg="${msg}"$'\n'"${pr_body}"
          fi
          export COMMIT_MESSAGE="$msg"
          out="$(bash scripts/release-version.sh)"
          echo "$out"
          target="$(echo "$out" | awk -F= '/^target_version=/{print $2}')"
          if [[ -z "$target" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No version bump required."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=$target" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          export GH_TOKEN="${GH_TOKEN:-$GITHUB_TOKEN}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add openspec/config.yaml
          if git diff --cached --quiet; then
            echo "No file changes after bump."
            exit 0
          fi
          git commit -m "[release] bump version to ${VERSION}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:master

      - name: Create git tag
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          export GH_TOKEN="${GH_TOKEN:-$GITHUB_TOKEN}"
          tag="v${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists."
            exit 0
          fi
          git tag -a "$tag" -m "Release ${VERSION}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$tag"
